name: Build Android APK

on:
  workflow_dispatch:        # lets you run it manually from the Actions tab
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install Capacitor
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Copy web app into Android project
        run: npx cap sync android

      - name: Add camera permission to Android manifest
        run: |
          M=android/app/src/main/AndroidManifest.xml
          grep -q 'android.permission.CAMERA' "$M" || \
            sed -i 's#<application#<uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n    <application#' "$M"
          echo "----- AndroidManifest.xml -----"
          cat "$M"

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CargoMate-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
